{% extends "base.html" %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-12">
        <h2 class="mb-4"><i class="fas fa-th-large"></i> User Dashboard</h2>
    </div>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <a href="{{ url_for('breed_detection') }}" class="text-decoration-none">
            <div class="card dashboard-card p-4 text-center">
                <i class="fas fa-camera fa-3x mb-3" style="color: var(--primary-color);"></i>
                <h4>Breed Detection</h4>
                <p class="text-muted">Upload image for breed identification</p>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="{{ url_for('detection_history') }}" class="text-decoration-none">
            <div class="card dashboard-card p-4 text-center">
                <i class="fas fa-history fa-3x mb-3" style="color: var(--accent-color);"></i>
                <h4>Detection History</h4>
                <p class="text-muted">View your past detections</p>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="{{ url_for('breed_info_page') }}" class="text-decoration-none">
            <div class="card dashboard-card p-4 text-center">
                <i class="fas fa-book fa-3x mb-3" style="color: #1e88e5;"></i>
                <h4>Breed Information</h4>
                <p class="text-muted">Browse all breed details</p>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="{{ url_for('view_approved_research') }}" class="text-decoration-none">
            <div class="card dashboard-card p-4 text-center">
                <i class="fas fa-file-alt fa-3x mb-3" style="color: #8e24aa;"></i>
                <h4>Research Papers</h4>
                <p class="text-muted">Access approved research</p>
            </div>
        </a>
    </div>
</div>

<style>
    .dashboard-card {
        transition: all 0.3s;
        height: 100%;
    }
    .dashboard-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
</style>
{% endblock %}
