{% extends "base.html" %}
{% block content %}

<style>
    .login-container {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f9fa;
        margin: -20px -15px;
        padding: 60px 15px;
    }

    .login-card {
        background: #ffffff;
        border-radius: 12px;
        padding: 60px 50px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12),
                    0 0 40px rgba(34, 197, 94, 0.6),
                    0 0 80px rgba(34, 197, 94, 0.3);
        max-width: 480px;
        width: 100%;
        border: 2px solid #22c55e;
        animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
        0%, 100% {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12),
                        0 0 40px rgba(34, 197, 94, 0.6),
                        0 0 80px rgba(34, 197, 94, 0.3);
        }
        50% {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12),
                        0 0 50px rgba(34, 197, 94, 0.8),
                        0 0 100px rgba(34, 197, 94, 0.4);
        }
    }

    .login-title {
        color: #1a202c;
        font-weight: 600;
        font-size: 1.75rem;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
    }

    .login-subtitle {
        color: #718096;
        font-size: 0.95rem;
        margin-bottom: 40px;
        font-weight: 400;
    }

    .login-btn {
        border: 1px solid #dee2e6;
        border-radius: 6px;
        padding: 16px 24px;
        font-size: 1rem;
        font-weight: 500;
        text-transform: none;
        transition: all 0.2s ease;
        margin-bottom: 14px;
        background: #ffffff;
        color: #495057;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        text-decoration: none;
    }

    .login-btn:hover {
        background: #f8f9fa;
        border-color: #22c55e;
        color: #212529;
        text-decoration: none;
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.6),
                    0 0 40px rgba(34, 197, 94, 0.3),
                    0 4px 12px rgba(0, 0, 0, 0.1);
    }

    .login-btn:active {
        transform: translateY(0);
    }

    .login-icon {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 16px;
        font-size: 1.2rem;
        flex-shrink: 0;
    }

    .icon-user {
        background: #e3f2fd;
        color: #1976d2;
    }

    .icon-researcher {
        background: #f3e5f5;
        color: #7b1fa2;
    }

    .icon-admin {
        background: #fff3e0;
        color: #f57c00;
    }

    .icon-signup {
        background: #e8f5e9;
        color: #388e3c;
    }

    .btn-text {
        font-weight: 500;
        color: #2d3748;
    }

    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 30px 0 24px;
        color: #a0aec0;
        font-size: 0.875rem;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #e2e8f0;
    }

    .divider span {
        padding: 0 12px;
    }

    @media (max-width: 768px) {
        .login-card {
            padding: 40px 30px;
        }

        .login-title {
            font-size: 1.5rem;
        }

        .login-btn {
            font-size: 0.95rem;
            padding: 14px 20px;
        }

        .login-icon {
            width: 36px;
            height: 36px;
            font-size: 1.1rem;
        }
    }
</style>

<div class="login-container">
    <div class="login-card">
        <h2 class="login-title text-center">Choose Login Type</h2>
        <p class="login-subtitle text-center">Select your account type to continue</p>

        <div class="d-flex flex-column">
            <a href="{{ url_for('login_normal_page') }}" class="login-btn w-100">
                <div class="login-icon icon-user">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <span class="btn-text">Normal User Login</span>
            </a>

            <a href="{{ url_for('login_research_page') }}" class="login-btn w-100">
                <div class="login-icon icon-researcher">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        <circle cx="10" cy="8" r="2"></circle>
                        <path d="M15 13a3 3 0 0 0-6 0"></path>
                    </svg>
                </div>
                <span class="btn-text">Researcher Login</span>
            </a>

            <a href="{{ url_for('login_admin_page') }}" class="login-btn w-100">
                <div class="login-icon icon-admin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 12l2 2 4-4"></path>
                    </svg>
                </div>
                <span class="btn-text">Admin Login</span>
            </a>

            <div class="divider">
                <span>OR</span>
            </div>

            <a href="{{ url_for('signup') }}" class="login-btn w-100">
                <div class="login-icon icon-signup">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                </div>
                <span class="btn-text">Create Account</span>
            </a>
        </div>
    </div>
</div>

{% endblock %}
